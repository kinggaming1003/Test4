services:
  qemu:
    image: qemux/qemu
    container_name: qemu
    environment:
      BOOT: "ubuntu"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./qemu:/storage
    environment:
     DISK_SIZE: "30G"
     RAM_SIZE: "6G"
     CPU_CORES: "2"
    restart: always
    stop_grace_period: 2m
