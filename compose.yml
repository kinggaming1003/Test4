services:
  qemu:
    image: qemux/qemu
    container_name: qemu
    environment:
      BOOT: "https://cdimage.kali.org/kali-2025.2/kali-linux-2025.2-qemu-amd64.7z"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./qemu:/storage
    restart: always
    stop_grace_period: 2m
